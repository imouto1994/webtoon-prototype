<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webtoon Stitch & Split (Desktop)</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #0f1115;
        color: #e7ecf3;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .card {
        background: #161920;
        border: 1px solid #1f2530;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 1.4rem;
      }
      p {
        margin: 4px 0 0;
        color: #b8c1ce;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      button {
        background: #2e8cf7;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .input-path {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,
          "Liberation Mono", "Courier New", monospace;
        color: #7bd88f;
      }
      #status {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      ul {
        padding-left: 18px;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
      }
      .segment {
        border: 1px solid #1f2530;
        border-radius: 8px;
        overflow: hidden;
        background: #0f1115;
      }
      .segment img {
        width: 100%;
        display: block;
      }
      .segment footer {
        padding: 8px;
        font-size: 0.85rem;
        color: #b8c1ce;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .segment a {
        color: #7bd88f;
        text-decoration: none;
        font-weight: 600;
      }
      .segment a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Webtoon Stitch & Split (Desktop)</h1>
        <p>
          Reuse the Node/Sharp pipeline in a desktop wrapper. Pick an input
          folder and (optionally) an output folder.
        </p>
        <div class="controls">
          <button id="pickInput">Choose Input Folder</button>
          <span id="inputPath" class="input-path"></span>
        </div>
        <div class="controls">
          <button id="pickOutput">Choose Output Folder (optional)</button>
          <span id="outputPath" class="input-path"></span>
        </div>
        <div class="controls">
          <button id="processBtn">Process</button>
          <span id="status"></span>
        </div>
      </section>
      <section class="card">
        <h2 style="margin: 0 0 8px">Generated Segments</h2>
        <div id="resultSummary"></div>
        <ul id="resultList"></ul>
        <div id="grid"></div>
      </section>
    </main>
    <script type="module" src="./renderer.mjs"></script>
  </body>
</html>
